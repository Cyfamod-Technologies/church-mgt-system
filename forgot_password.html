<div class="app-wrapper d-block">
    <main class="w-100 p-0">
        <div class="container-fluid">
            <div class="row">
                <div class="col-12 p-0">
                    <div class="login-form-container">
                        <div class="mb-4">
                            <a class="logo" href="index.html">
                                <img alt="logo" src="assets/images/logo/3.png">

                        </div>
                        <div class="form_container">
                            <form class="app-form">
                                <div class="mb-3 text-center">

                                    <p class="f-s-12 text-secondary">Enter the email address or phone number used during login.</p>
                                </div>
                                <div class="mb-3">

                                    <input class="form-control" placeholder="Enter email or phone number" type="text">
                                </div>
                                <div>
                                    <a class="btn btn-primary w-100" href="password_reset.html" role="button">Send Reset Link / OTP</a>
                                </div>
                                <div class="text-center mt-3">
                                    <a class="text-secondary text-decoration-underline" href="sign_in.html">Back to Login</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

</div>
