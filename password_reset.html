<!DOCTYPE html>
<html lang="en">

<head>
    <meta content="text/html; charset=UTF-8" http-equiv="Content-Type">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="Reset password page using the template design." name="description">
    <meta content="church password reset" name="keywords">
    <meta content="la-themes" name="author">
    <link href="assets/images/logo/favicon.png" rel="icon" type="image/x-icon">
    <link href="assets/images/logo/favicon.png" rel="shortcut icon" type="image/x-icon">
    <title>Reset Password</title>

    <link href="assets/vendor/fontawesome/css/all.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
          rel="stylesheet">
    <link href="assets/vendor/tabler-icons/tabler-icons.css" rel="stylesheet" type="text/css">
    <link href="assets/vendor/bootstrap/bootstrap.min.css" rel="stylesheet" type="text/css">
    <link href="assets/css/style.css" rel="stylesheet" type="text/css">
    <link href="assets/css/responsive.css" rel="stylesheet" type="text/css">
</head>

<body>
<div class="app-wrapper d-block">
    <main class="w-100 p-0">
        <div class="container-fluid">
            <div class="row">
                <div class="col-12 p-0">
                    <div class="login-form-container">
                        <div class="mb-4">
                            <a class="logo" href="index.html">
                                <img alt="logo" src="assets/images/logo/3.png">
                            </a>
                        </div>
                        <div class="form_container">
                            <form class="app-form">
                                <div class="mb-3 text-center">
                                    <h3>Reset Your Password</h3>
                                    <p class="f-s-12 text-secondary">Create a new password and return to the admin login.</p>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="newPassword">New Password</label>
                                    <input class="form-control" id="newPassword" placeholder="Enter new password" type="password">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                                    <input class="form-control" id="confirmPassword" placeholder="Confirm password" type="password">
                                </div>
                                <div>
                                    <a class="btn btn-primary w-100" href="sign_in.html" role="button">Reset Password</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="assets/js/jquery-3.6.3.min.js"></script>
<script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
</body>

</html>
