<!DOCTYPE html>
<html lang="en">

<head>
    <meta content="text/html; charset=UTF-8" http-equiv="Content-Type">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="Church management sign in page using the template design." name="description">
    <meta content="church management, sign in" name="keywords">
    <meta content="la-themes" name="author">
    <link href="assets/images/logo/favicon.png" rel="icon" type="image/x-icon">
    <link href="assets/images/logo/favicon.png" rel="shortcut icon" type="image/x-icon">
    <title>Church Management Login</title>

    <link href="assets/vendor/fontawesome/css/all.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
          rel="stylesheet">
    <link href="assets/vendor/tabler-icons/tabler-icons.css" rel="stylesheet" type="text/css">
    <link href="assets/vendor/bootstrap/bootstrap.min.css" rel="stylesheet" type="text/css">
    <link href="assets/css/style.css" rel="stylesheet" type="text/css">
    <link href="assets/css/responsive.css" rel="stylesheet" type="text/css">
</head>

<body>
<div class="app-wrapper d-block">
    <main class="w-100 p-0">
        <div class="container-fluid">
            <div class="row">
                <div class="col-12 p-0">
                    <div class="login-form-container">
                        <div class="mb-4">
                            <a class="logo" href="index.html">
                                <img alt="logo" src="assets/images/logo/3.png">
                            </a>
                        </div>
                        <div class="form_container">
                            <form class="app-form" id="signInForm">
                                <div class="mb-3 text-center">
                                    <h3>Login to Church Management</h3>
                                    <p class="f-s-12 text-secondary">Use email address or phone number to access the admin workspace.</p>
                                </div>
                                <div class="alert alert-danger d-none" id="signInAlert" role="alert"></div>
                                <div class="mb-3">
                                    <label class="form-label" for="loginId">Email or Phone Number</label>
                                    <input class="form-control" id="loginId" placeholder="admin@church.org or +234..." type="text">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="loginPassword">Password</label>
                                    <input class="form-control" id="loginPassword" placeholder="Enter password" type="password">
                                </div>
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <div class="form-check">
                                        <input class="form-check-input" id="rememberMe" type="checkbox">
                                        <label class="form-check-label" for="rememberMe">Remember me</label>
                                    </div>
                                    <a class="text-primary text-decoration-underline" href="forgot_password.html">Forgot Password</a>
                                </div>
                                <div>
                                    <button class="btn btn-primary w-100" id="signInSubmit" type="submit">Continue</button>
                                </div>
                                <div class="app-divider-v justify-content-center">
                                    <p>OR</p>
                                </div>
                                <div class="text-center">
                                    <a class="text-secondary text-decoration-underline" href="sign_up.html">Create Church Account</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="assets/js/jquery-3.6.3.min.js"></script>
<script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
<script src="assets/js/app-config.js"></script>
<script src="assets/js/app-api.js"></script>
<script>
const existingSignInSession = window.LFC_API.getSession();

if (existingSignInSession && existingSignInSession.user && existingSignInSession.user.id && existingSignInSession.church && existingSignInSession.church.id) {
    window.location.replace('dashboard.html');
}

const signInForm = document.getElementById('signInForm');
const signInAlert = document.getElementById('signInAlert');
const signInSubmit = document.getElementById('signInSubmit');

function showSignInAlert(message) {
    signInAlert.textContent = message;
    signInAlert.classList.remove('d-none');
}

function hideSignInAlert() {
    signInAlert.classList.add('d-none');
    signInAlert.textContent = '';
}

signInForm.addEventListener('submit', async function (event) {
    event.preventDefault();
    hideSignInAlert();
    signInSubmit.disabled = true;
    signInSubmit.textContent = 'Signing in...';

    try {
        const response = await window.LFC_API.request('auth/login', {
            method: 'POST',
            body: {
                login: document.getElementById('loginId').value.trim(),
                password: document.getElementById('loginPassword').value
            }
        });

        window.LFC_API.saveSession({
            user: response.data.user,
            church: response.data.church
        });

        window.location.href = 'dashboard.html';
    } catch (error) {
        showSignInAlert(error.message);
    } finally {
        signInSubmit.disabled = false;
        signInSubmit.textContent = 'Continue';
    }
});
</script>
</body>

</html>
