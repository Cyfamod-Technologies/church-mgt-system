<!DOCTYPE html>
<html lang="en">

<head>
    <meta content="text/html; charset=UTF-8" http-equiv="Content-Type">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="Church registration page using the template design." name="description">
    <meta content="church registration" name="keywords">
    <meta content="la-themes" name="author">
    <link href="assets/images/logo/favicon.png" rel="icon" type="image/x-icon">
    <link href="assets/images/logo/favicon.png" rel="shortcut icon" type="image/x-icon">
    <title>Register Church Account</title>

    <link href="assets/vendor/fontawesome/css/all.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
          rel="stylesheet">
    <link href="assets/vendor/tabler-icons/tabler-icons.css" rel="stylesheet" type="text/css">
    <link href="assets/vendor/bootstrap/bootstrap.min.css" rel="stylesheet" type="text/css">
    <link href="assets/css/style.css" rel="stylesheet" type="text/css">
    <link href="assets/css/responsive.css" rel="stylesheet" type="text/css">
</head>

<body>
<div class="app-wrapper d-block">
    <main class="w-100 p-0">
        <div class="container-fluid py-4">
            <div class="row justify-content-center">
                <div class="col-12 col-xl-10">
                    <div class="card">
                        <div class="card-body">
                            <div class="text-center mb-4">
                                <a class="logo d-inline-block mb-3" href="index.html">
                                    <img alt="logo" src="assets/images/logo/3.png">
                                </a>
                                <h3>Create Church Account</h3>
                                <p class="f-s-12 text-secondary mb-0">Use the approved registration flow fields from the system document.</p>
                            </div>
                            <form class="app-form">
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label class="form-label">Church Name</label>
                                            <input class="form-control" placeholder="Enter church name" type="text">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label class="form-label">Church Type or Level</label>
                                            <select class="form-select">
                                                <option>State Church</option>
                                                <option>District Church</option>
                                                <option>Zonal Church</option>
                                                <option>Area Church</option>
                                                <option>Church Branch</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label class="form-label">State</label>
                                            <input class="form-control" placeholder="Enter state" type="text">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label class="form-label">District / Area</label>
                                            <input class="form-control" placeholder="Enter district or area" type="text">
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <div class="mb-3">
                                            <label class="form-label">Church Address</label>
                                            <textarea class="form-control" rows="3"></textarea>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label class="form-label">Church Email</label>
                                            <input class="form-control" placeholder="Enter official email" type="email">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label class="form-label">Official Phone Number</label>
                                            <input class="form-control" placeholder="Enter official phone number" type="text">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label class="form-label">Pastor in Charge Name</label>
                                            <input class="form-control" placeholder="Enter pastor name" type="text">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label class="form-label">Admin Full Name</label>
                                            <input class="form-control" placeholder="Enter admin full name" type="text">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label class="form-label">Admin Phone Number</label>
                                            <input class="form-control" placeholder="Enter admin phone number" type="text">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label class="form-label">Admin Email</label>
                                            <input class="form-control" placeholder="Enter admin email" type="email">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label class="form-label">Password</label>
                                            <input class="form-control" placeholder="Enter password" type="password">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label class="form-label">Confirm Password</label>
                                            <input class="form-control" placeholder="Confirm password" type="password">
                                        </div>
                                    </div>
                                </div>
                                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                                    <a class="text-primary text-decoration-underline" href="sign_in.html">Go to Login</a>
                                    <a class="btn btn-primary" href="dashboard.html" role="button">Create Church Account</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="assets/js/jquery-3.6.3.min.js"></script>
<script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
</body>

</html>
